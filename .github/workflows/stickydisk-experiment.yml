name: Experiment / PostHog Cache Comparison

on:
  push:
    branches: [experiment/posthog-stickydisk]
  workflow_dispatch:
    inputs:
      scenario:
        description: Build scenario to benchmark
        type: choice
        options:
          - warm-no-change
          - frontend-change
        default: warm-no-change

concurrency:
  group: experiment-posthog-stickydisk
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.backend }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: github-gha-cache
            runner: ubuntu-24.04
            runs_on: false
            sticky: false
          - backend: runs-on-s3-cache
            runner: runs-on/fleet=benchmark-posthog-s3/env=dev
            runs_on: true
            sticky: false
          - backend: runs-on-sticky-disk-750mbps
            runner: runs-on/fleet=benchmark-posthog-sticky/env=dev
            runs_on: true
            sticky: true

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90

    steps:
      - name: Configure RunsOn and sticky BuildKit cache
        if: ${{ matrix.runs_on }}
        id: runs-on
        uses: runs-on/action@d246a920c88cfc47139d742d9e665534dd436842
        with:
          cache: ${{ matrix.sticky && 'buildkit' || 'false' }}
          fail_on_missing: ${{ matrix.sticky }}
          show_costs: summary
          metrics: cpu,memory,disk

      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Determine upstream commit SHA
        id: upstream
        run: echo "sha=$(cd upstream && git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Apply controlled frontend change
        if: ${{ inputs.scenario == 'frontend-change' }}
        run: |
          printf '\n// RunsOn cache benchmark: controlled frontend change.\n' >> upstream/frontend/src/index.tsx
          git -C upstream diff --check
          git -C upstream diff --stat

      - name: Reclaim GitHub runner disk space
        if: ${{ !matrix.runs_on }}
        run: sudo rm -rf /opt

      - name: Set up ephemeral Buildx
        if: ${{ !matrix.sticky }}
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 1

      - name: Set up persistent Buildx
        if: ${{ matrix.sticky }}
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
        with:
          name: ${{ steps.runs-on.outputs.buildkit-builder }}
          version: v0.34.1
          driver: docker-container
          driver-opts: |
            image=moby/buildkit:v0.31.1
          cleanup: false
          buildkitd-config-inline: |
            ${{ steps.runs-on.outputs.buildkit-inline-config }}
            [worker.oci]
              max-parallelism = 1

      - name: Record environment and cache state
        env:
          BACKEND: ${{ matrix.backend }}
          STICKY_CACHE_HIT: ${{ steps.runs-on.outputs.cache-hit }}
          UPSTREAM_SHA: ${{ steps.upstream.outputs.sha }}
        run: |
          set -euxo pipefail
          echo "BACKEND=${BACKEND}"
          echo "UPSTREAM_SHA=${UPSTREAM_SHA}"
          echo "CACHE_HIT=${STICKY_CACHE_HIT:-remote-cache-managed-by-buildkit}"
          echo "RUNS_ON_INSTANCE_TYPE=${RUNS_ON_INSTANCE_TYPE:-github-hosted}"
          echo "CPUS=$(nproc)"
          grep MemTotal /proc/meminfo
          docker version
          docker buildx version
          docker buildx inspect --bootstrap
          if [ "${BACKEND}" = "runs-on-sticky-disk-750mbps" ]; then
            test -f "${RUNS_ON_STICKYDISK_READY_FILE}"
            grep -Fx "${RUNS_ON_STICKYDISK_DIR}" "${RUNS_ON_STICKYDISK_READY_FILE}"
            test -d "${RUNS_ON_STICKYDISK_DIR}/buildkit/root"
            cat "${RUNS_ON_STICKYDISK_TIMINGS_FILE}" 2>/dev/null || true
            df -h "${RUNS_ON_STICKYDISK_DIR}"
          fi

      - name: Build PostHog with remote cache
        if: ${{ !matrix.sticky }}
        uses: docker/build-push-action@v4
        with:
          context: ./upstream
          cache-from: type=gha,scope=posthog-m8a-stickydisk-v3
          cache-to: type=gha,scope=posthog-m8a-stickydisk-v3,mode=max
          build-args: |
            BUILDKIT_CONTEXT_KEEP_GIT_DIR=1

      - name: Build PostHog with sticky cache
        if: ${{ matrix.sticky }}
        uses: docker/build-push-action@v4
        with:
          builder: ${{ steps.runs-on.outputs.buildkit-builder }}
          context: ./upstream
          build-args: |
            BUILDKIT_CONTEXT_KEEP_GIT_DIR=1

      - name: Final disk state
        if: ${{ always() }}
        run: |
          docker system df || true
          df -h / "${RUNS_ON_STICKYDISK_DIR:-/}" || true
